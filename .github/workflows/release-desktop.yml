name: Release Desktop

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root deps
        run: npm install

      - name: Install desktop deps
        working-directory: packages/desktop
        run: npm install

      - name: Build & package (mac)
        working-directory: packages/desktop
        run: npm run package:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Strip quarantine from DMGs
        run: |
          for f in packages/desktop/release/*.dmg; do
            xattr -cr "$f" || true
          done

      - name: Upload mac artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: packages/desktop/release/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root deps
        run: npm install

      - name: Install desktop deps
        working-directory: packages/desktop
        run: npm install

      - name: Build & package (win)
        working-directory: packages/desktop
        run: npm run package:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload win artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: packages/desktop/release/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root deps
        run: npm install

      - name: Install desktop deps
        working-directory: packages/desktop
        run: npm install

      - name: Build & package (linux)
        working-directory: packages/desktop
        run: npm run package:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload linux artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: packages/desktop/release/*.AppImage
